<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Test App Check JS</title>
  <script type="module">
    import { initializeApp,  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js";
    import { initializeAppCheck, ReCaptchaV3Provider, getToken } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app-check.js";

    // Remplace par tes vraies valeurs
    const firebaseConfig = {
      apiKey: "AIzaSyCa9xbAeLgwOula7_zxQwKjvshTrKIOTWQ",
      authDomain: "imx-translator.firebaseapp.com",
      projectId: "imx-translator",
      storageBucket: "imx-translator.firebasestorage.app",
      messagingSenderId: "1075445091126",
      appId: "1:1075445091126:web:f3664f5970be233d380197",
      measurementId: "G-0Q9L0RSCF3"
    };
    const RECAPTCHA_SITE_KEY = "6LeI834sAAAAAN0tbvdmSeajxCYCj3uarepl_jSh";
    const BACKEND_URL = "http://localhost:8080/api/translate";
    
    // Initialise Firebase et App Check
    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    console.log("Firebase initialisé");

    // For localhost, enable debug token mode
    let appCheck;
    if (location.hostname === "localhost" || location.hostname === "127.0.0.1") {
      self.FIREBASE_APPCHECK_DEBUG_TOKEN = true;
      console.log("🔧 Debug mode enabled for localhost");
      console.log("⚠️ Check console for debug token to add to Firebase Console");
      
      // Initialize with ReCaptcha provider - it will use debug token automatically
      appCheck = initializeAppCheck(app, {
        provider: new ReCaptchaV3Provider(RECAPTCHA_SITE_KEY),
        isTokenAutoRefreshEnabled: true
      });
    } else {
      // Production: use real ReCaptcha
      appCheck = initializeAppCheck(app, {
        provider: new ReCaptchaV3Provider(RECAPTCHA_SITE_KEY),
        isTokenAutoRefreshEnabled: true
      });
    }

    async function testAppCheck() {
      try {
        console.log("🔄 Requesting App Check token...");
        const { token } = await getToken(appCheck, false);

        if (!token) {
          throw new Error("Failed to get App Check token");
        }

        console.log("✅ App Check token obtained:", token.substring(0, 50) + "...");

        // Appel d'un endpoint protégé avec le token
        console.log("🔄 Calling backend with App Check token...");
        const response = await fetch(BACKEND_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "X-Firebase-AppCheck": token
          },
          body: JSON.stringify({
            text: "Hello world",
            target_language: "fr",
            source_language: "en"
          })
        });

        const result = await response.text();
        console.log("Status:", response.status);
        console.log("Réponse:", result);
        
        const statusEmoji = response.ok ? "✅" : "❌";
        document.getElementById("result").textContent =
          statusEmoji + " Status: " + response.status + "\n\n" + result;
      } catch (e) {
        console.error("❌ Erreur App Check:", e);
        document.getElementById("result").textContent = 
          "❌ Error: " + e.message + "\n\nCheck browser console for details.\n\n" +
          "If you see a debug token in the console, add it to Firebase Console:\n" +
          "Firebase Console > App Check > Apps > Debug Tokens";
      }
    }
    window.testAppCheck = testAppCheck;
  </script>
</head>
<body>
  <h1>Test App Check (JS)</h1>
  <button onclick="testAppCheck()">Tester endpoint protégé</button>
  <pre id="result"></pre>
</body>
</html>
